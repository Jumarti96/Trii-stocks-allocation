# Stock Allocation Pipeline - Configuration
# Edit values here. Derived values (period_freq, date_offset, future_freq,
# time_window) are computed automatically by pipeline/config.py - do not add them.

# Data and timing
periods_per_year: 54          # 52 for weekly data, 12 for monthly
interval: "1wk"               # "1wk" for weekly, "1mo" for monthly
days_of_data: 3650            # Historical window to download (days)

# Step 1 download + activity filter
batch_size: 500                 # tickers per download batch
download_workers: 3             # parallel batch workers
download_timeout: 30            # per-batch yfinance timeout (s); generous for a 500-ticker batch

# Transformer model (Step 3)
periods_to_forecast: 4        # Periods ahead to predict
n_transformer_runs: 150       # Independent training runs; predictions are averaged
time_window: null             # Input sequence length; null means derived as periods_per_year

# Portfolio optimisation (Step 4)
allocation_top_n: 150        # candidates fed to optimizer; null = no cap (full universe)
allocation_ranking: sharpe   # "sharpe" (mu/sigma) | "return" (mu only)
allocation_method: parametric_michaud   # "parametric_michaud" | "msr"
michaud_spread: 4.0                      # s; draw scale on Sigma/T (4.0 = "s4", deployed: most consistent across regimes, lower vol/turnover)
michaud_mc_draws: 1000                   # K Monte-Carlo mu draws
michaud_seed: 0                          # int = reproducible; null = fresh draws
rf_rate: 0.11                 # Risk-free rate (10-Y Colombian bond yield ~11.2%)
max_weight: 0.15              # Maximum portfolio weight per stock
min_weight: 0.05              # Minimum portfolio weight per stock

# Output (Step 5)
investment_cop: 120000000     # Total capital available (COP)
output_path: "results/allocation_output.csv"

# Advanced — pipeline internals (calibrated defaults; regular users don't need to change these)
liquidity_window_fraction: 0.10       # lookback = last 10% of the time-series (proportional to download horizon)
liquidity_min_active_fraction: 0.85   # keep stocks trading in >= 85% of the lookback window
liquidity_topn: null                  # optional compute cap before the transformer step (null = off)
download_warn_fraction: 0.80          # warn if fewer than 80% of tickers downloaded successfully
zero_volume_warn_threshold: 0.25      # warn if > 25% of stocks report zero volume (data-source alarm)
winsorization_lower_pct: 1            # lower percentile bound for forecast winsorisation
winsorization_upper_pct: 99           # upper percentile bound for forecast winsorisation
transformer_epochs: 50                # training epochs per transformer run
transformer_warmup_epochs: 5          # LR linear-warmup epochs (out of transformer_epochs)
transformer_lr: 0.0001                # peak Adam learning rate
transformer_batch_size: 32            # mini-batch size for transformer training
